services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pairboard
      POSTGRES_USER: pairboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=20
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pairboard -d pairboard"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 320m
    shm_size: 64m
    logging: &default-logging
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  api:
    image: pairboard-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://pairboard:${POSTGRES_PASSWORD}@postgres:5432/pairboard?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    logging: *default-logging

  web:
    image: pairboard-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?SITE_ADDRESS is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 96m
    logging: *default-logging

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
