services:
  postgres:
    image: postgres:16-alpine
    container_name: pairboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pairboard
      POSTGRES_PASSWORD: pairboard
      POSTGRES_DB: pairboard
    ports:
      - "5432:5432"
    volumes:
      - pairboard_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pairboard -d pairboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pairboard_data:

